apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: data-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://gitlab-web:8989/root/fastapi-app.git'
    targetRevision: HEAD
    path: 04-k8s-data-api/helm/data-api
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
