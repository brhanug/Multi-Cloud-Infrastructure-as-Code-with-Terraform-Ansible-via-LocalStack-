apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: fastapi-app-network-latency
  namespace: default
spec:
  action: delay
  mode: all
  selector:
    labelSelectors:
      app.kubernetes.io/name: fastapi-app
  delay:
    latency: '250ms'
    correlation: '100'
    jitter: '0ms'
  direction: to
  duration: '60s'
