stages:
  - lint
  - test
  - build
  - release

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

lint-dashboard:
  stage: lint
  image: python:3.11-slim
  script:
    - pip install ruff
    - ruff check ./

test-dashboard:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt
    - pytest

build-dashboard:
  stage: build
  image: docker:24.0.5
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker login -u root -p 'xY9$kL2#mP5*qT1!' localhost:5005
    - docker build -t localhost:5005/root/system-dashboard:$CI_COMMIT_SHA -t localhost:5005/root/system-dashboard:latest .

trivy-scan-dashboard:
  stage: build
  image:
    name: aquasec/trivy:0.49.1
    entrypoint: [""]
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    TRIVY_CACHE_DIR: ".trivycache/"
  needs:
    - build-dashboard
  script:
    - trivy image --cache-dir $TRIVY_CACHE_DIR --exit-code 1 --severity CRITICAL localhost:5005/root/system-dashboard:latest
  cache:
    key: trivy-cache
    paths:
      - .trivycache/

push-dashboard:
  stage: release
  image: docker:24.0.5
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  needs:
    - build-dashboard
    - trivy-scan-dashboard
  script:
    - docker login -u root -p 'xY9$kL2#mP5*qT1!' localhost:5005
    - docker push localhost:5005/root/system-dashboard:$CI_COMMIT_SHA
    - docker push localhost:5005/root/system-dashboard:latest
