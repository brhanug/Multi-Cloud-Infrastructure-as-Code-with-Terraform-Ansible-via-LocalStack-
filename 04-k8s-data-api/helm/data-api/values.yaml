replicaCount: 1

image:
  repository: localhost:5005/root/fastapi-app/data-api
  pullPolicy: Always
  # Overridden in CI/CD pipeline
  tag: latest

imagePullSecrets:
  - name: gitlab-registry-credentials

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: traefik
  annotations: {}
  hosts:
    - host: ""
      paths:
        - path: /data-api
          pathType: Prefix

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
